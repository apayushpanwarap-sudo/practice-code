<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Student Grade Calculator</h1>

        <label for="subjects">Number of Subjects (Min 5):</label>
        <input type="number" id="subjects" min="5" placeholder="Enter number of subjects">

        <button onclick="generateInputs()">Create Subject Fields</button>

        <div id="marksContainer"></div>

        <button id="calculateBtn" onclick="calculateGrade()" style="display:none;">
            Calculate Result
        </button>

        <div id="result"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
